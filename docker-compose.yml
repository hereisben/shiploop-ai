services:
  postgres:
    image: postgres:16
    container_name: shiploop-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: shiploop
      POSTGRES_PASSWORD: shiploop_password
      POSTGRES_DB: shiploop_ai
    ports:
      - "5432:5432"
    volumes:
      - shiploop_postgres_data:/var/lib/postgresql/data

volumes:
  shiploop_postgres_data:
